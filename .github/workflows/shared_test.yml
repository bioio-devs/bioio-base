name: Shared Test

on:
  workflow_call:
    inputs:
      bioformats_test:
        description: Run needs the special case handling for bioformats
        required: false
        default: false
        type: boolean
      test_python_versions:
        description: JSON array of Python versions for test matrix
        required: false
        default: '["3.10", "3.11", "3.12", "3.13"]'
        type: string

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.test_python_versions) }}
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.test_checkout_submodules }}
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Java (Windows only)
        if: ${{ inputs.bioformats_test && runner.os == 'Windows' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        if: ${{ !inputs.bioformats_test }}
        run: python -m pip install --upgrade pip && pip install .[test]
      - name: Install Dependencies (bioformats)
        if: ${{ inputs.bioformats_test }}
        run: pip install uv && uv pip install --system .[test]
      - name: Run Tests
        run: just test
