name: Shared Test

on:
  workflow_call:
    inputs:
      test_checkout_submodules:
        description: "Checkout submodules mode for test job (for example: recursive)"
        required: false
        default: ""
        type: string
      test_install_command:
        description: Dependency install command for test job
        required: false
        default: "python -m pip install --upgrade pip && pip install .[test]"
        type: string
      test_shell_bash:
        description: Run tests using bash shell
        required: false
        default: false
        type: boolean
      setup_java_windows:
        description: Set up Java on Windows in test job
        required: false
        default: false
        type: boolean
      install_ffmpeg_macos:
        description: Install ffmpeg on macOS before tests
        required: false
        default: false
        type: boolean
      codecov_use_oidc:
        description: Use OIDC authentication for Codecov upload
        required: false
        default: false
        type: boolean
      test_python_versions:
        description: JSON array of Python versions for test matrix
        required: false
        default: '["3.10", "3.11", "3.12", "3.13"]'
        type: string

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.test_python_versions) }}
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules == '' && !inputs.test_checkout_lfs }}
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules != '' && !inputs.test_checkout_lfs }}
        with:
          submodules: ${{ inputs.test_checkout_submodules }}
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules == '' && inputs.test_checkout_lfs }}
        with:
          lfs: true
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules != '' && inputs.test_checkout_lfs }}
        with:
          submodules: ${{ inputs.test_checkout_submodules }}
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Java (Windows only)
        if: ${{ inputs.setup_java_windows && runner.os == 'Windows' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: ${{ inputs.test_install_command }}
      - name: Run Tests
        run: just test
