name: Shared Lint

on:
  workflow_call:
    inputs:
      lint_python_version:
        description: Python version for lint job
        required: false
        default: "3.13"
        type: string
      lint_checkout_submodules:
        description: "Checkout submodules mode for lint job (for example: recursive)"
        required: false
        default: ""
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.lint_checkout_submodules == '' }}
      - uses: actions/checkout@v6
        if: ${{ inputs.lint_checkout_submodules != '' }}
        with:
          submodules: ${{ inputs.lint_checkout_submodules }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.lint_python_version }}
      - uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[lint]
      - name: Lint
        run: just lint
