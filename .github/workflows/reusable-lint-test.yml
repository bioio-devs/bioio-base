name: Reusable Lint and Test

on:
  workflow_call:
    inputs:
      lint_python_version:
        description: Python version for lint job
        required: false
        default: "3.13"
        type: string
      lint_checkout_submodules:
        description: "Checkout submodules mode for lint job (for example: recursive)"
        required: false
        default: ""
        type: string
      lint_install_command:
        description: Dependency install command for lint job
        required: false
        default: "python -m pip install --upgrade pip && pip install .[lint]"
        type: string
      test_python_versions:
        description: JSON array of Python versions for test matrix
        required: false
        default: '["3.10", "3.11", "3.12", "3.13"]'
        type: string
      test_os:
        description: JSON array of OS values for test matrix
        required: false
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        type: string
      install_just:
        description: Whether to install just via extractions/setup-just
        required: false
        default: true
        type: boolean
      run_just_lint:
        description: Lint command to execute
        required: false
        default: "just lint"
        type: string
      run_just_test:
        description: Test command to execute
        required: false
        default: "just test"
        type: string
      test_checkout_submodules:
        description: "Checkout submodules mode for test job (for example: recursive)"
        required: false
        default: ""
        type: string
      test_checkout_lfs:
        description: Whether to enable Git LFS checkout in test job
        required: false
        default: false
        type: boolean
      test_install_command:
        description: Dependency install command for test job
        required: false
        default: "python -m pip install --upgrade pip && pip install .[test]"
        type: string
      test_shell_bash:
        description: Run tests using bash shell
        required: false
        default: false
        type: boolean
      setup_java_windows:
        description: Set up Java on Windows in test job
        required: false
        default: false
        type: boolean
      java_distribution:
        description: Java distribution for setup-java action
        required: false
        default: "temurin"
        type: string
      java_version:
        description: Java version for setup-java action
        required: false
        default: "17"
        type: string
      install_ffmpeg_macos:
        description: Install ffmpeg on macOS before tests
        required: false
        default: false
        type: boolean
      upload_codecov:
        description: Upload coverage to Codecov after tests
        required: false
        default: true
        type: boolean
      codecov_use_oidc:
        description: Use OIDC authentication for Codecov upload
        required: false
        default: false
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.lint_checkout_submodules == '' }}
      - uses: actions/checkout@v6
        if: ${{ inputs.lint_checkout_submodules != '' }}
        with:
          submodules: ${{ inputs.lint_checkout_submodules }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.lint_python_version }}
      - uses: extractions/setup-just@v3
        if: ${{ inputs.install_just }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: ${{ inputs.lint_install_command }}
      - name: Lint
        run: ${{ inputs.run_just_lint }}

  test:
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.test_python_versions != '' && inputs.test_python_versions || '["3.10", "3.11", "3.12", "3.13"]') }}
        os: ${{ fromJSON(inputs.test_os != '' && inputs.test_os || '["ubuntu-latest", "macos-latest", "windows-latest"]') }}

    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules == '' && !inputs.test_checkout_lfs }}
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules != '' && !inputs.test_checkout_lfs }}
        with:
          submodules: ${{ inputs.test_checkout_submodules }}
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules == '' && inputs.test_checkout_lfs }}
        with:
          lfs: true
      - uses: actions/checkout@v6
        if: ${{ inputs.test_checkout_submodules != '' && inputs.test_checkout_lfs }}
        with:
          submodules: ${{ inputs.test_checkout_submodules }}
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Java (Windows only)
        if: ${{ inputs.setup_java_windows && runner.os == 'Windows' }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.java_distribution }}
          java-version: ${{ inputs.java_version }}
      - uses: extractions/setup-just@v3
        if: ${{ inputs.install_just }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Dependencies
        run: ${{ inputs.test_install_command }}
      - name: Ensure ffmpeg on macOS
        if: ${{ inputs.install_ffmpeg_macos && runner.os == 'macOS' }}
        run: brew install ffmpeg
      - name: Run Tests
        if: ${{ !inputs.test_shell_bash }}
        run: ${{ inputs.run_just_test }}
      - name: Run Tests (bash)
        if: ${{ inputs.test_shell_bash }}
        shell: bash
        run: ${{ inputs.run_just_test }}
      - name: Upload Codecov
        if: ${{ inputs.upload_codecov && !inputs.codecov_use_oidc }}
        uses: codecov/codecov-action@v5
      - name: Upload Codecov (OIDC)
        if: ${{ inputs.upload_codecov && inputs.codecov_use_oidc }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
